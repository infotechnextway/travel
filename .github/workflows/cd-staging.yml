name: CD Staging
on:
  push:
    branches: [develop]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Docker images
        run: |
          docker build -f infra/docker/Dockerfile.api -t api:staging .
          docker build -f infra/docker/Dockerfile.web -t web:staging .
          docker build -f infra/docker/Dockerfile.admin -t admin:staging .
          docker build -f infra/docker/Dockerfile.vendor -t vendor:staging .
      - name: Deploy to Staging
        run: echo "Staging deployment triggered"
