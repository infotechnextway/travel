name: CI API
on:
  push:
    branches: [main, develop]
    paths: ['services/api/**', 'packages/**', '.github/workflows/ci-api.yml']
  pull_request:
    branches: [main]
    paths: ['services/api/**', 'packages/**', '.github/workflows/ci-api.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace=api
      - run: npm run typecheck --workspace=api
      - run: npm run test --workspace=api
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-min-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-min-32-characters-long
      - run: npm run build --workspace=api
