version: '3.8'

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/india-travel
    depends_on:
      - mongo
    networks:
      - india-travel-network

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - india-travel-network

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin
    ports:
      - '3001:3001'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - india-travel-network

  vendor:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.vendor
    ports:
      - '3002:3002'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - india-travel-network

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - india-travel-network

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - admin
      - vendor
      - api
    networks:
      - india-travel-network

volumes:
  mongo-data:

networks:
  india-travel-network:
    driver: bridge
